baseURL = 'https://theabhislab.github.io/abhislabblog/'
title = 'Abhis Lab Blog'
theme = 'hugo-PaperMod'

# Modern 2026 Hugo configuration block
defaultContentLanguage = 'en'

[languages.en]
    locale = 'en-us'
    languageName = 'English'
    weight = 1

[params]
    author = "Abhi"
    defaultTheme = "auto" 
    showtoc = true
    
    # Forcefully bypass the automated schema footer to avoid compilation crashes
    schema = false